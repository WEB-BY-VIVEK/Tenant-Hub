<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background gradient -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle top highlight -->
  <rect width="64" height="64" rx="14" fill="url(#shine)" opacity="0.35"/>
  <!-- Activity / EKG heartbeat line matching the site logo -->
  <polyline
    points="5,32 15,32 20,18 27,46 35,22 40,32 59,32"
    stroke="white"
    stroke-width="5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="shine" cx="50%" cy="0%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
